<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>EV China 后台 · 线索管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0B1F33;--grn:#61D836;--grnd:#3E9E1E;--bg:#F2F4F7;--line:#E5EBF2;--mut:#5A6A7E;--wa:#25D366}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:#152436;line-height:1.5}
  .topbar{background:var(--ink);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
  .topbar .b{font-weight:600}
  .topbar .b span{color:var(--grn)}
  .wrap{max-width:1000px;margin:0 auto;padding:20px}
  button{font-family:inherit;cursor:pointer}
  .btn{background:var(--grn);color:var(--ink);border:none;border-radius:8px;padding:10px 16px;font-weight:600}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff}
  .btn.sm{padding:6px 12px;font-size:13px}
  /* login */
  .login{max-width:360px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px}
  .login h1{font-size:20px;margin-bottom:6px;color:var(--ink)}
  .login p{color:var(--mut);font-size:14px;margin-bottom:18px}
  .login input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;margin-bottom:12px;font-size:15px}
  .login .btn{width:100%}
  .err{color:#C8102E;font-size:13px;margin-top:8px;min-height:18px}
  /* cards */
  .bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .bar h2{font-size:18px;color:var(--ink)}
  .count{color:var(--mut);font-size:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .card .row1{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .card .nm{font-weight:600;font-size:16px;color:var(--ink)}
  .card .tm{color:var(--mut);font-size:12px}
  .meta{display:flex;flex-wrap:wrap;gap:14px;font-size:14px;margin-bottom:10px}
  .meta b{color:var(--mut);font-weight:500}
  .wa{display:inline-block;background:var(--wa);color:#fff;border-radius:6px;padding:3px 10px;font-size:13px;font-weight:600;text-decoration:none}
  .prob{background:var(--bg);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:10px;white-space:pre-wrap}
  .photos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .photos a{display:block}
  .photos img{width:84px;height:84px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  .ctrl{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  select,.note{font-family:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px}
  .note{flex:1;min-width:200px}
  .pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px}
  .s-new{background:#FFF1D6;color:#8A6A12}
  .s-contacted{background:#E3F0FF;color:#1857A8}
  .s-quoted{background:#EADBFF;color:#5A2B9E}
  .s-done{background:#DFF6E3;color:#1E7A3B}
  .empty{text-align:center;color:var(--mut);padding:40px}
  .muted{color:var(--mut);font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <div class="b">EV China <span>·</span> 线索后台</div>
  <button class="btn ghost sm" id="logoutBtn" style="display:none">退出登录</button>
</div>

<!-- 登录 -->
<div class="login" id="loginView">
  <h1>登录后台</h1>
  <p>用你在 Supabase 建的邮箱账号登录,查看客户线索。</p>
  <input type="email" id="email" placeholder="邮箱" autocomplete="username">
  <input type="password" id="password" placeholder="密码" autocomplete="current-password">
  <button class="btn" id="loginBtn">登录</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- 线索列表 -->
<div class="wrap" id="appView" style="display:none">
  <div class="bar">
    <h2>客户线索</h2>
    <div>
      <span class="count" id="count"></span>
      <button class="btn ghost sm" id="refreshBtn" style="color:var(--ink);border-color:var(--line)">刷新</button>
    </div>
  </div>
  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = "https://lodzuuxgpansscpfgtcf.supabase.co";
const SB_KEY = "sb_publishable_Xg7qubOA7_k5fP_yV5uRHQ_Si2R1LC8";
const sb = supabase.createClient(SB_URL, SB_KEY);

const STATUS = {
  new:       {label:"新线索", cls:"s-new"},
  contacted: {label:"已联系", cls:"s-contacted"},
  quoted:    {label:"已报价", cls:"s-quoted"},
  done:      {label:"已完成", cls:"s-done"}
};

const $ = (id)=>document.getElementById(id);
function esc(s){ return (s||"").toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function digits(s){
  // 规范成印尼国际格式给 wa.me 用：0812...→62812... / 8xx...→628xx... / +62/62 保持
  let d=(s||"").replace(/[^0-9]/g,"");
  if(d.startsWith("62")) return d;
  if(d.startsWith("0"))  return "62"+d.slice(1);
  if(d.startsWith("8"))  return "62"+d;
  return d;
}

async function refreshAuthUI(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    $("loginView").style.display="none";
    $("appView").style.display="";
    $("logoutBtn").style.display="";
    loadLeads();
  }else{
    $("loginView").style.display="";
    $("appView").style.display="none";
    $("logoutBtn").style.display="none";
  }
}

$("loginBtn").addEventListener("click", async ()=>{
  $("loginErr").textContent="";
  const email=$("email").value.trim(), password=$("password").value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $("loginErr").textContent = "登录失败:"+error.message; return; }
  refreshAuthUI();
});
$("password").addEventListener("keydown",e=>{ if(e.key==="Enter") $("loginBtn").click(); });
$("logoutBtn").addEventListener("click", async ()=>{ await sb.auth.signOut(); refreshAuthUI(); });
$("refreshBtn").addEventListener("click", loadLeads);

async function loadLeads(){
  $("list").innerHTML = '<div class="empty">加载中…</div>';
  const { data, error } = await sb.from("leads").select("*").order("created_at",{ascending:false});
  if(error){ $("list").innerHTML = '<div class="empty">读取失败:'+esc(error.message)+'</div>'; return; }
  $("count").textContent = "共 "+data.length+" 条";
  if(!data.length){ $("list").innerHTML='<div class="empty">还没有线索。</div>'; return; }
  $("list").innerHTML="";
  for(const r of data){ $("list").appendChild(await card(r)); }
}

async function card(r){
  const el=document.createElement("div"); el.className="card";
  const st = STATUS[r.status] || STATUS.new;
  const wa = digits(r.whatsapp);
  const time = r.created_at ? new Date(r.created_at).toLocaleString("zh-CN") : "";

  // 照片签名链接
  let photosHtml="";
  if(Array.isArray(r.photo_paths) && r.photo_paths.length){
    const parts=[];
    for(const p of r.photo_paths){
      const { data:su } = await sb.storage.from("lead-photos").createSignedUrl(p, 3600);
      if(su&&su.signedUrl) parts.push('<a href="'+su.signedUrl+'" target="_blank"><img src="'+su.signedUrl+'"></a>');
    }
    if(parts.length) photosHtml='<div class="photos">'+parts.join("")+'</div>';
  }

  el.innerHTML =
    '<div class="row1"><span class="nm">'+esc(r.nama||"(无名)")+' <span class="pill '+st.cls+'">'+st.label+'</span></span>'+
    '<span class="tm">'+esc(time)+'</span></div>'+
    '<div class="meta">'+
      (wa?'<span><b>WhatsApp:</b> <a class="wa" href="https://wa.me/'+wa+'" target="_blank">'+esc(r.whatsapp)+' ↗</a></span>':'')+
      (r.kota?'<span><b>城市:</b> '+esc(r.kota)+'</span>':'')+
      (r.brand_model?'<span><b>车型:</b> '+esc(r.brand_model)+'</span>':'')+
    '</div>'+
    (r.problem?'<div class="prob">'+esc(r.problem)+'</div>':'')+
    photosHtml+
    '<div class="ctrl">'+
      '<select data-id="'+r.id+'" class="st">'+
        Object.keys(STATUS).map(k=>'<option value="'+k+'"'+(k===(r.status||"new")?" selected":"")+'>'+STATUS[k].label+'</option>').join("")+
      '</select>'+
      '<input class="note" data-id="'+r.id+'" placeholder="备注…" value="'+esc(r.note||"")+'">'+
      '<button class="btn sm save" data-id="'+r.id+'">保存</button>'+
    '</div>';

  el.querySelector(".st").addEventListener("change", async (e)=>{
    await sb.from("leads").update({status:e.target.value}).eq("id", r.id);
    loadLeads();
  });
  el.querySelector(".save").addEventListener("click", async (e)=>{
    const note = el.querySelector(".note").value;
    const btn=e.target; btn.textContent="…";
    await sb.from("leads").update({note}).eq("id", r.id);
    btn.textContent="已保存"; setTimeout(()=>btn.textContent="保存",1200);
  });
  return el;
}

refreshAuthUI();
</script>
</body>
</html>
